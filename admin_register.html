<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Register | Adhaar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#7a7d3f;
  --accent2:#9a8f5c;
  --text:#2f2e26;
  --muted:#5a594d;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{
  min-height:100vh;
  background:linear-gradient(135deg,#2f2e26 0%,#4a4a30 50%,#2f2e26 100%);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.card{
  background:#fff;width:100%;max-width:420px;
  padding:48px 44px;border-radius:28px;
  box-shadow:0 40px 100px rgba(0,0,0,.35);
  animation:fadeUp .5s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.brand{text-align:center;margin-bottom:36px}
.brand-icon{
  width:56px;height:56px;border-radius:16px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:26px;margin:0 auto 14px;
}
.brand h1{font-size:22px;font-weight:800;color:var(--text)}
.brand p{font-size:13px;color:var(--muted);margin-top:4px}
.field{margin-bottom:20px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
.field input{
  width:100%;padding:13px 16px;
  border:2px solid #e5e3d8;border-radius:12px;
  font-size:14px;color:var(--text);background:#fafaf6;
  transition:.25s ease;outline:none;
}
.field input:focus{border-color:var(--accent);background:#fff}
.btn{
  width:100%;padding:14px;border:none;border-radius:50px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;
  box-shadow:0 12px 30px rgba(122,125,63,.4);
  transition:.3s ease;margin-top:8px;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 18px 40px rgba(122,125,63,.55)}
.links{text-align:center;margin-top:20px;font-size:13px;color:var(--muted)}
.links a{color:var(--accent);font-weight:600;text-decoration:none}
.alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:20px;text-align:center}
.alert.error{background:#fee2e2;color:#991b1b}
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="brand-icon">🌿</div>
    <h1>Create Admin</h1>
    <p>Adhaar – The SoulServe</p>
  </div>

  <script>
    const msgs = {missing:'All fields are required.',email:'Invalid email address.',exists:'This email is already registered.',db:'Registration failed. Try again.'};
    const e = new URLSearchParams(location.search).get('error');
    if(e && msgs[e]) document.write('<div class="alert error">'+msgs[e]+'</div>');
  </script>

  <form action="admin_register.php" method="POST">
    <script>
    fetch('get_csrf.php').then(r=>r.json()).then(d=>{
      const i=document.createElement('input');
      i.type='hidden';i.name='csrf_token';i.value=d.token;
      document.querySelector('form').prepend(i);
    });
    </script>
    <div class="field">
      <label>Full Name</label>
      <input type="text" name="name" placeholder="Admin Name" required>
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="admin@adhaar.org" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="Min 8 characters" required minlength="8">
    </div>
    <button class="btn" type="submit">Create Account →</button>
  </form>

  <div class="links">
    Already have an account? <a href="admin_login.html">Login</a>
  </div>
</div>

</body>
</html>
